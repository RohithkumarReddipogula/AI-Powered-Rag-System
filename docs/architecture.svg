<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#ffffff">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<!-- OFFLINE ZONE -->
<rect x="20" y="20" width="300" height="205" rx="10" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="6 3"/>
<text x="34" y="38" font-size="12" fill="#888">Offline — index build</text>
<!-- MS MARCO -->
<rect x="40" y="50" width="260" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="170" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">MS MARCO</text>
<text x="170" y="83" text-anchor="middle" font-size="11" fill="#185FA5">8.84M passages</text>
<line x1="170" y1="94" x2="170" y2="116" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<!-- BM25 index -->
<rect x="40" y="116" width="120" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="135" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">BM25 index</text>
<text x="100" y="153" text-anchor="middle" font-size="11" fill="#0F6E56">1.41 MB</text>
<!-- FAISS index -->
<rect x="180" y="116" width="120" height="48" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="240" y="135" text-anchor="middle" font-size="12" font-weight="500" fill="#26215C">FAISS index</text>
<text x="240" y="153" text-anchor="middle" font-size="11" fill="#534AB7">3.05 MB · E5</text>
<text x="170" y="195" text-anchor="middle" font-size="11" fill="#888">Total: 4.46 MB · 99.8% compression</text>
<!-- BOUNDARY -->
<line x1="20" y1="238" x2="660" y2="238" stroke="#ddd" stroke-width="1" stroke-dasharray="4 4"/>
<text x="340" y="230" text-anchor="middle" font-size="11" fill="#aaa">— online query time —</text>
<!-- USER QUERY -->
<rect x="260" y="252" width="160" height="48" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="272" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">User query</text>
<text x="340" y="289" text-anchor="middle" font-size="11" fill="#5F5E5A">via API or UI</text>
<!-- Arrows to stages -->
<path d="M280 300 L160 328" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M400 300 L520 328" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Stage 1 BM25 -->
<rect x="60" y="328" width="185" height="58" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="152" y="349" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">Stage 1 — BM25</text>
<text x="152" y="366" text-anchor="middle" font-size="11" fill="#0F6E56">Sparse retrieval</text>
<text x="152" y="380" text-anchor="middle" font-size="11" fill="#0F6E56">380ms</text>
<!-- Stage 2+3 E5 -->
<rect x="435" y="328" width="185" height="58" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="527" y="349" text-anchor="middle" font-size="12" font-weight="500" fill="#26215C">Stage 2+3 — E5</text>
<text x="527" y="366" text-anchor="middle" font-size="11" fill="#534AB7">Embed + FAISS search</text>
<text x="527" y="380" text-anchor="middle" font-size="11" fill="#534AB7">75ms + 220ms</text>
<!-- Arrows to fusion -->
<path d="M205 386 L285 418" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M475 386 L395 418" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Stage 4 Fusion -->
<rect x="240" y="418" width="200" height="58" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#412402">Stage 4 — Fusion</text>
<text x="340" y="457" text-anchor="middle" font-size="11" fill="#854F0B">Min-max norm · α=0.70</text>
<text x="340" y="471" text-anchor="middle" font-size="11" fill="#854F0B">35ms</text>
<line x1="340" y1="476" x2="340" y2="502" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Output -->
<rect x="220" y="502" width="240" height="58" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="522" text-anchor="middle" font-size="13" font-weight="500" fill="#173404">Top-k passages</text>
<text x="340" y="539" text-anchor="middle" font-size="11" fill="#3B6D11">Recall@10=93% · MRR=1.0</text>
<text x="340" y="553" text-anchor="middle" font-size="11" fill="#3B6D11">710ms total latency</text>
</svg>
